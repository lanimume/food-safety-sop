<script src="supabase.js"></script>
<script>
let sopData = [];
let sopCategories = [];
let currentFilter = 'all';
let editingId = null;
let deletingId = null;

const defaultTemplates = [
    {
        title: "原料入库检验流程",
        category: "进货查验",
        priority: "high",
        steps: [
            { name: "供应商资质审核", require_photo: false },
            { name: "原料感官检查", require_photo: true },
            { name: "索证索票核对", require_photo: false },
            { name: "实验室检测", require_photo: true },
            { name: "入库登记", require_photo: false }
        ]
    },
    {
        title: "生产加工卫生控制",
        category: "过程控制",
        priority: "high",
        steps: [
            { name: "人员健康检查", require_photo: false },
            { name: "设备清洁消毒", require_photo: true },
            { name: "环境温度监控", require_photo: false },
            { name: "交叉污染防控", require_photo: true },
            { name: "半成品检验", require_photo: true },
            { name: "成品留样", require_photo: true }
        ]
    },
    {
        title: "仓储温湿度管理",
        category: "储存管理",
        priority: "medium",
        steps: [
            { name: "冷库温度校准", require_photo: false },
            { name: "湿度记录检查", require_photo: false },
            { name: "防虫防鼠检查", require_photo: true },
            { name: "库存盘点", require_photo: false }
        ]
    },
    {
        title: "餐具清洗消毒",
        category: "清洗消毒",
        priority: "low",
        steps: [
            { name: "去渣冲洗", require_photo: false },
            { name: "洗涤剂清洗", require_photo: true },
            { name: "清水冲净", require_photo: false },
            { name: "热力消毒", require_photo: true },
            { name: "保洁存放", require_photo: false }
        ]
    },
    {
        title: "食品添加剂使用管理",
        category: "添加剂管理",
        priority: "high",
        steps: [
            { name: "使用台账建立", require_photo: false },
            { name: "专人专柜管理", require_photo: true },
            { name: "使用范围核对", require_photo: false },
            { name: "称量记录复核", require_photo: true },
            { name: "GB2760合规审查", require_photo: false }
        ]
    },
    {
        title: "废弃物处置记录",
        category: "废弃物",
        priority: "medium",
        steps: [
            { name: "分类收集", require_photo: true },
            { name: "存放区域消毒", require_photo: true },
            { name: "转运记录", require_photo: false },
            { name: "处置单位资质审核", require_photo: false }
        ]
    }
];

document.addEventListener('DOMContentLoaded', async () => {
    updateTime();
    setInterval(updateTime, 1000);

    // 权限检查（仅管理员可访问）
    const authorized = await authGuard.init();
    if (!authorized) return;

    try {
        if (typeof supabase !== 'undefined' && supabase.createClient) {
            window.supabase = supabase.createClient(
                'https://pgphhfqiyqdnlrqurzvv.supabase.co',
                'sb_publishable_VD3xRTYLl_0CXCz_SR1jHw_17shJsXj'
            );
        } else if (typeof supabase !== 'undefined') {
            window.supabase = supabase;
        }
    } catch (e) {
        console.error('Supabase 初始化失败:', e);
        document.getElementById('system-status').textContent = '离线模式';
        document.getElementById('status-dot').classList.remove('bg-white', 'animate-pulse');
        document.getElementById('status-dot').classList.add('bg-red-400');
        document.getElementById('status-text').textContent = '数据库未连接';
    }

    try {
        // 并行加载模板和分类
        const [templates, categories] = await Promise.all([
            loadSopTemplates(),
            loadSopCategories()
        ]);
        sopData = templates;
        sopCategories = categories;
        if (sopData.length === 0) {
            for (const t of defaultTemplates) {
                await saveSopTemplate(t);
            }
            sopData = await loadSopTemplates();
        }
    } catch (e) {
        console.error('数据加载失败:', e);
        showToast('警告', '数据库连接失败，显示离线数据', 'warning');
        sopData = defaultTemplates.map((t, i) => ({ ...t, id: i + 1, created_at: new Date().toISOString() }));
    }

    // 加载分类到下拉框和筛选按钮
    loadCategorySelect();
    renderCategoryFilterButtons();

    document.getElementById('loading').classList.add('hidden');
    renderSopCards();
});

// ==================== 分类管理 ====================
function loadCategorySelect() {
    const select = document.getElementById('sop-category');
    select.innerHTML = sopCategories.map(c => 
        `<option value="${c.name}">${c.name}</option>`
    ).join('');
}

function renderCategoryFilterButtons() {
    const container = document.querySelector('.flex.gap-3.flex-wrap');
    if (!container) return;

    const allBtn = `<button onclick="filterSop('all')" class="filter-btn active px-4 py-2 rounded-xl text-sm font-medium bg-indigo-500 text-white shadow-lg shadow-indigo-200 transition-all" data-filter="all">全部</button>`;

    const categoryBtns = sopCategories.map(c => 
        `<button onclick="filterSop('${c.name}')" class="filter-btn px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-600 border border-gray-200 hover:border-indigo-300 transition-all" data-filter="${c.name}">${c.name}</button>`
    ).join('');

    container.innerHTML = allBtn + categoryBtns;
}

// 分类管理弹窗
function showCategoryManageModal() {
    renderCategoryList();
    openModal('category-manage-modal', 'category-manage-content');
}

function closeCategoryManageModal() {
    const modal = document.getElementById('category-manage-modal');
    const content = document.getElementById('category-manage-content');
    content.classList.remove('scale-100', 'opacity-100');
    content.classList.add('scale-95', 'opacity-0');
    setTimeout(() => { modal.classList.add('hidden'); }, 300);
}

function renderCategoryList() {
    const list = document.getElementById('category-list');
    if (sopCategories.length === 0) {
        list.innerHTML = '<p class="text-gray-400 text-center py-4 text-sm">暂无分类</p>';
        return;
    }
    list.innerHTML = sopCategories.map((cat, index) => `
        <div class="flex items-center justify-between px-3 py-2 bg-gray-50 rounded-lg">
            <span class="text-sm text-gray-700">${cat.name}</span>
            <button onclick="removeCategoryItem(${cat.id})" class="text-red-400 hover:text-red-600 w-6 h-6 flex items-center justify-center">
                <i class="fas fa-times text-xs"></i>
            </button>
        </div>
    `).join('');
}

async function addCategoryItem() {
    const input = document.getElementById('category-input');
    const name = input.value.trim();
    if (!name) return;

    const exists = sopCategories.some(c => c.name === name);
    if (exists) {
        showToast('已存在', '该分类已存在', 'warning');
        return;
    }

    try {
        const saved = await saveSopCategory({ name });
        if (saved) {
            sopCategories.push(saved);
            input.value = '';
            renderCategoryList();
            loadCategorySelect();
            renderCategoryFilterButtons();
            showToast('添加成功', '分类已保存');
        }
    } catch (e) {
        showToast('添加失败', '数据库连接异常', 'error');
    }
}

async function removeCategoryItem(id) {
    // 检查是否被模板使用
    const inUse = sopData.some(s => s.category === sopCategories.find(c => c.id === id)?.name);
    if (inUse) {
        showToast('删除失败', '该分类正在被模板使用，请先修改相关模板', 'error');
        return;
    }

    try {
        const success = await deleteSopCategory(id);
        if (success) {
            sopCategories = sopCategories.filter(c => c.id !== id);
            renderCategoryList();
            loadCategorySelect();
            renderCategoryFilterButtons();
            showToast('删除成功', '分类已移除');
        }
    } catch (e) {
        showToast('删除失败', '数据库连接异常', 'error');
    }
}

function renderSopCards() {
    const grid = document.getElementById('sop-grid');
    grid.innerHTML = '';

    const filtered = currentFilter === 'all' 
        ? sopData 
        : sopData.filter(s => s.category === currentFilter);

    if (filtered.length === 0) {
        grid.innerHTML = '<p class="text-gray-400 text-center py-8 col-span-full">暂无该分类的模板</p>';
        return;
    }

    filtered.forEach(sop => {
        const priorityConfig = {
            high: { label: '高优先级', color: 'text-red-500', bg: 'bg-red-50' },
            medium: { label: '中优先级', color: 'text-amber-500', bg: 'bg-amber-50' },
            low: { label: '低优先级', color: 'text-gray-400', bg: 'bg-gray-50' }
        };
        const p = priorityConfig[sop.priority || 'medium'];

        const card = document.createElement('div');
        card.className = 'bg-white rounded-2xl p-6 shadow-sm border border-gray-100 card-hover relative';
        card.innerHTML = `
            <div class="flex justify-between items-start mb-4">
                <div>
                    <span class="inline-block px-2.5 py-1 rounded-lg text-xs font-medium ${p.bg} ${p.color} mb-2">
                        <i class="fas fa-flag mr-1"></i>${p.label}
                    </span>
                    <h3 class="font-bold text-gray-800 text-lg">${sop.title}</h3>
                    <p class="text-sm text-gray-500 mt-1">${sop.category}</p>
                </div>
                <div class="flex gap-1">
                    <button onclick="editSop(${sop.id})" class="w-8 h-8 rounded-lg bg-gray-50 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 flex items-center justify-center transition-colors" title="编辑">
                        <i class="fas fa-pen text-xs"></i>
                    </button>
                    <button onclick="deleteSop(${sop.id})" class="w-8 h-8 rounded-lg bg-gray-50 text-gray-400 hover:text-red-600 hover:bg-red-50 flex items-center justify-center transition-colors" title="删除">
                        <i class="fas fa-trash text-xs"></i>
                    </button>
                </div>
            </div>

            <div class="space-y-2 mb-4">
                <p class="text-xs text-gray-400 font-medium mb-2">执行步骤 (${(sop.steps || []).length}步)</p>
                ${(sop.steps || []).slice(0, 4).map((step, idx) => `
                    <div class="flex items-center gap-2 text-sm p-2 rounded-lg bg-gray-50">
                        <div class="w-5 h-5 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-xs font-bold flex-shrink-0">${idx + 1}</div>
                        <span class="text-gray-700">${step.name}</span>
                        ${step.require_photo ? '<i class="fas fa-camera text-blue-400 ml-auto text-xs" title="需要拍照"></i>' : ''}
                    </div>
                `).join('')}
                ${(sop.steps || []).length > 4 ? `<p class="text-xs text-gray-400 text-center">...还有 ${sop.steps.length - 4} 个步骤</p>` : ''}
            </div>

            <div class="flex items-center justify-between pt-4 border-t border-gray-100 text-xs text-gray-400">
                <span><i class="far fa-clock mr-1"></i>${new Date(sop.created_at).toLocaleDateString('zh-CN')}</span>
                <span>ID: #${sop.id}</span>
            </div>
        `;
        grid.appendChild(card);
    });
}

function filterSop(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        if (btn.dataset.filter === filter) {
            btn.classList.add('bg-indigo-500', 'text-white', 'shadow-lg', 'shadow-indigo-200');
            btn.classList.remove('bg-white', 'text-gray-600', 'border', 'border-gray-200');
        } else {
            btn.classList.remove('bg-indigo-500', 'text-white', 'shadow-lg', 'shadow-indigo-200');
            btn.classList.add('bg-white', 'text-gray-600', 'border', 'border-gray-200');
        }
    });
    renderSopCards();
}

function showCreateModal() {
    editingId = null;
    document.getElementById('sop-modal-title').textContent = '新建 SOP 模板';
    document.getElementById('sop-title').value = '';
    document.getElementById('sop-category').selectedIndex = 0;
    document.querySelectorAll('input[name="sop-priority"]').forEach(r => r.checked = r.value === 'medium');
    renderSteps([]);
    openModal('sop-modal', 'sop-modal-content');
}

function editSop(id) {
    editingId = id;
    const sop = sopData.find(s => s.id === id);
    if (!sop) return;

    document.getElementById('sop-modal-title').textContent = '编辑 SOP 模板';
    document.getElementById('sop-title').value = sop.title || '';
    document.getElementById('sop-category').value = sop.category || '进货查验';
    document.querySelectorAll('input[name="sop-priority"]').forEach(r => {
        r.checked = r.value === (sop.priority || 'medium');
    });
    renderSteps(sop.steps || []);
    openModal('sop-modal', 'sop-modal-content');
}

function renderSteps(steps) {
    const container = document.getElementById('sop-steps');
    container.innerHTML = '';
    if (steps.length === 0) {
        addStep();
        return;
    }
    steps.forEach((step, idx) => {
        const row = document.createElement('div');
        row.className = 'step-row flex items-center gap-2';
        row.innerHTML = `
            <div class="w-6 h-6 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center text-xs flex-shrink-0">${idx+1}</div>
            <input type="text" class="step-input flex-1 px-3 py-2 rounded-lg border border-gray-200 text-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none" value="${step.name}" placeholder="步骤名称" data-idx="${idx}">
            <label class="flex items-center gap-1 text-xs text-gray-500 cursor-pointer select-none whitespace-nowrap">
                <input type="checkbox" class="rounded text-indigo-500 focus:ring-indigo-500" ${step.require_photo ? 'checked' : ''} data-idx="${idx}">
                <i class="fas fa-camera"></i>拍照
            </label>
            <button onclick="removeStep(${idx})" class="w-7 h-7 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 flex items-center justify-center transition-colors">
                <i class="fas fa-times text-xs"></i>
            </button>
        `;
        container.appendChild(row);
    });
}

function addStep() {
    const container = document.getElementById('sop-steps');
    const idx = container.children.length;
    const row = document.createElement('div');
    row.className = 'step-row flex items-center gap-2';
    row.innerHTML = `
        <div class="w-6 h-6 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center text-xs flex-shrink-0">${idx+1}</div>
        <input type="text" class="step-input flex-1 px-3 py-2 rounded-lg border border-gray-200 text-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none" value="" placeholder="步骤名称" data-idx="${idx}">
        <label class="flex items-center gap-1 text-xs text-gray-500 cursor-pointer select-none whitespace-nowrap">
            <input type="checkbox" class="rounded text-indigo-500 focus:ring-indigo-500" data-idx="${idx}">
            <i class="fas fa-camera"></i>拍照
        </label>
        <button onclick="removeStep(${idx})" class="w-7 h-7 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 flex items-center justify-center transition-colors">
            <i class="fas fa-times text-xs"></i>
        </button>
    `;
    container.appendChild(row);
}

function removeStep(idx) {
    const container = document.getElementById('sop-steps');
    if (container.children.length <= 1) {
        showToast('提示', '至少保留一个步骤', 'warning');
        return;
    }
    container.children[idx]?.remove();
    Array.from(container.children).forEach((row, i) => {
        row.querySelector('.w-6').textContent = i + 1;
        row.querySelector('input[type="text"]').dataset.idx = i;
        row.querySelector('input[type="checkbox"]').dataset.idx = i;
        row.querySelector('button').setAttribute('onclick', `removeStep(${i})`);
    });
}

function openModal(modalId, contentId) {
    const modal = document.getElementById(modalId);
    const content = document.getElementById(contentId);
    modal.classList.remove('hidden');
    setTimeout(() => {
        content.classList.remove('scale-95', 'opacity-0');
        content.classList.add('scale-100', 'opacity-100');
    }, 10);
}

function closeSopModal() {
    const modal = document.getElementById('sop-modal');
    const content = document.getElementById('sop-modal-content');
    content.classList.remove('scale-100', 'opacity-100');
    content.classList.add('scale-95', 'opacity-0');
    setTimeout(() => { modal.classList.add('hidden'); editingId = null; }, 300);
}

async function saveSop() {
    const title = document.getElementById('sop-title').value.trim();
    const category = document.getElementById('sop-category').value;
    const priority = document.querySelector('input[name="sop-priority"]:checked')?.value || 'medium';

    if (!title) { showToast('输入错误', '请输入流程名称', 'error'); return; }

    const container = document.getElementById('sop-steps');
    const steps = Array.from(container.children).map(row => ({
        name: row.querySelector('input[type="text"]').value.trim() || '未命名步骤',
        require_photo: row.querySelector('input[type="checkbox"]').checked
    })).filter(s => s.name !== '未命名步骤');

    if (steps.length === 0) { showToast('输入错误', '请至少添加一个步骤', 'error'); return; }

    const template = editingId 
        ? { id: editingId, title, category, priority, steps }
        : { title, category, priority, steps };

    try {
        const saved = await saveSopTemplate(template);
        if (saved) {
            if (editingId) {
                const idx = sopData.findIndex(s => s.id === editingId);
                if (idx > -1) sopData[idx] = saved;
                showToast('保存成功', 'SOP 模板已更新');
            } else {
                sopData.unshift(saved);
                showToast('创建成功', '新的 SOP 模板已添加到模板池');
            }
            closeSopModal();
            renderSopCards();
        }
    } catch (e) {
        showToast('保存失败', '数据库连接异常，请稍后重试', 'error');
    }
}

function deleteSop(id) {
    deletingId = id;
    openModal('delete-modal', 'delete-modal-content');
}

function closeDeleteModal() {
    const modal = document.getElementById('delete-modal');
    const content = document.getElementById('delete-modal-content');
    content.classList.remove('scale-100', 'opacity-100');
    content.classList.add('scale-95', 'opacity-0');
    setTimeout(() => { modal.classList.add('hidden'); deletingId = null; }, 300);
}

async function confirmDelete() {
    if (!deletingId) return;
    try {
        const success = await deleteSopTemplate(deletingId);
        if (success) {
            sopData = sopData.filter(s => s.id !== deletingId);
            renderSopCards();
            showToast('删除成功', 'SOP 模板已移除');
        } else {
            showToast('删除失败', '该模板可能已被班次引用，请先移除关联', 'error');
        }
    } catch (e) {
        showToast('删除失败', '数据库连接异常', 'error');
    }
    closeDeleteModal();
}
</script>

<!-- 主题切换初始化 -->
<script>
(function() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
    }
})();

function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    if (isDark) {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
    } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
    }
}
</script>
</body>
</html>
